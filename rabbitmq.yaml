- name: configure rabbitmq server 
  hosts: rabbitmq 
  become: yes 
  tasks:
  - name: set rabbitmq repo 
    ansible,builtin.copy:
      src: rabbitmq.repo 
      dest: /etc/yum.repos.d/rabbitmq.repo 
  - name: install rabbitmq 
    ansible.builtin.dnf:
       name: rabbitmq-server 
       state: present 
  
  - name: enable and start the rabbitmq
    ansible.builtin.service:
      name: rabbitmq-server
      state: started
      enabled: yes 

  community.rabbitmq.rabbitmq_user:
    user: roboshop 
    password: roboshop123
    permissions:
      - vhost: /
        configure_priv: .*
        read_priv: .*
        write_priv: .*
    state: present

  