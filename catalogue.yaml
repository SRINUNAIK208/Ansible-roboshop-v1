- name: configure catalogue server 
  hosts: catalogue 
  become: yes 
  tasks:
  - name: disabled nodejs latest version 
    ansible.builtin.command: dnf module disable nodejs -y
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install node js
    ansible.builtin.dnf:
      name: nodejs 
      state: present 

  - name: create app directory
    ansible.builtin.file:
      path: /app
      state: directory


  - name: create system user 
    ansible.builtin.user:
      name: roboshop
      shell: /sbin/nologin 
      home: /app
      system: true
      

  - name: download the catalogue code 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip 

  - name: unzip the catalogue code 
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip 
      dest: /app
      remote_src: yes

  - name: install dependencies 
    community.general.npm:
       path: /app
  - name: copy the catalogue service
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service 

  - name: deamon reload 
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: start catalogue service 
    ansible.builtin.service:
      name: catalogue
      state: started
      enabled: yes 

  - name: copy mongodb repo 
    ansible.builtin.copy:
      src: mongo.repo 
      dest: /etc/yum.repos.d/mongo.repo 

  - name: install mongodb client 
    ansible.builtin.dnf:
      name: mongodb-mongosh 
      state: present 

  - name: load the master data from database 
    ansible.builtin.shell: mongosh --host mongodb.srinunayak.online </app/db/master-data.js
