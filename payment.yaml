- name: configure payment server 
  hosts: payment
  become: yes 
  tasks:
  - name: install python package 
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: installed
    loop:
    - python3 
    - gcc 
    - python3-devel

  - name: create system user 
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app 
      shell: /sbin/nologin 

  - name: create working directory 
    ansible.builtin.file:
      path: /app 
      state: directory 

  - name: downlaod the payment code 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip 

  - name: unarchive the payment code 
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app 
      remote_src: yes

  - name: install dependencies
    ansible.builtin.pip:
      requirements: requirements.txt
      executable: pip3.9
    args:
      chdir: /app

  - name: connect remote server 
    ansible.builtin.copy:
      src: payment.service
      dest: /etc/systemd/system/payment.service 

  - name: load systemctl daemon_reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: start and enable the payment server 
    ansible.builtin.service:
      name: payment
      state: started 
      enabled: yes 

      
