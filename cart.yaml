- name: configure cart server 
  host: cart 
  become: yes 
  task:
  - name: disable latest version and enable old version 
    ansible.builtin.command: dnf module disable nodejs -y
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs 
    ansible.builtin.dnf:
      name: nodejs
      state: present
    
  - name: create system user 
    ansible.builtin.user:
      name: roboshop
      system: true 
      home: /app 
      shell: /sbin/nologin 

  - name: create working directory 
    ansible.builtin.file:
      path: /app 
      state: directory

  - name: download the cart code 
    ansible.builtin.get_url:
      src: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
      dest: /tmp/cart.zip 

  - name: unzip the cart code
    ansible.builtin.unarchive:
      src: /tmp/cart.zip
      dest: /app 
      remote_src: yes 

  - name: install dependencies
    community.general.npm:
      path: /app

  - name: setup systemd service 
    ansible.builtin.copy:
      src: cart.service
      dest: /etc/systemd/system/cart.service 

  - name: systemctl daemon_reload
    ansible.builtin.systemd_service:
      daemon_reload: true 

  - name: start and enable cart server 
    ansible.builtin.service:
      name: cart 
      state: started
      enabled: yes 